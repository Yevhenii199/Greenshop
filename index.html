<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="styles/styles.css">
    <title>Document</title>
</head>
<body>
     <header>
        <div class="div_list_left">
           <a class="all_plants" href="#">
             All Plants
           </a>
           <a class="new_arrivals_sale" href="#">
             New Arrivals
           </a>
           <a class="new_arrivals_sale" href="#">
             Sale
           </a>
        </div>
        <div class="div_list_right" >
            <p class="short_by">
                Short by:
                <a class="default" href="#">
                    Default sorting
                    <img src="images/default_sorting.svg" alt="default sorting">
                </a>
            </p>
        </div>
     </header>
     <main>
        <div class="div__flower">
            <div class="images">
                <img src="images/barberton_daisy.png" alt="barberton daisy">
                <div class="btn">
                    <a href="#">
                        <img src="images/log_shopping.svg" alt="shopping">
                    </a>
                    <a href="#">
                        <img src="images/log_like.svg" alt="like">
                    </a>
                    <a href="#">
                        <img src="images/log_search.svg" alt="search">
                    </a>       
                </div>
            </div>
                <p class="flower">
                    Barberton Daisy
                </p>
                <p class="price">
                    $119.00
                </p>
        </div>
        <div class="div__flower">
            <div class="images">
                <img src="images/begonia.png" alt="angel wing begonia">
                <div class="btn">
                    <a href="#">
                        <img src="images/log_shopping.svg" alt="shopping">
                    </a>
                    <a href="#">
                        <img src="images/log_like.svg" alt="like">
                    </a>
                    <a href="#">
                        <img src="images/log_search.svg" alt="search">
                    </a>       
                </div>
            </div>
                <p class="flower">
                    Angel Wing Begonia
                </p>
                <p class="price">
                    $169.00
                </p>
        </div>
        <div class="div__flower">
            <div class="images">
                <p class="discount">
                    13% OFF
                </p>
                <img src="images/african_violet.png" alt="african violet">
                <div class="btn">
                    <a href="#">
                        <img src="images/log_shopping.svg" alt="shopping">
                    </a>
                    <a href="#">
                        <img src="images/log_like.svg" alt="like">
                    </a>
                    <a href="#">
                        <img src="images/log_search.svg" alt="search">
                    </a>       
                </div>
            </div>
                <p class="flower">
                    African Violet
                </p>
                <p class="price">
                    $199.00
                </p>
                <p class="old_price" >
                    <del>
                       $229.00
                    </del>
                </p>
            </div>
     </main>
</body>
</html>
