<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style/normalize.css">
    <link rel="stylesheet" href="style/styles.css">
    <title>greenshop</title>
</head>
<body>
    <header>
        <div class="group" >
            <p class="login">
                Login
            </p>
            <p class="i">
                |
            </p>
            <p class="register" >
                Register
            </p>
        </div>
    </header>
    <main>
        <p class="text_enter">
            Enter your email and password to register.
        </p>
        <form>
            <div>
                <input class="username width_height" type="text" name="name" placeholder="Username" required>
                <input class="enter_your_email width_height" type="email" name="email" placeholder="Enter your email address" required>
                <input class="password width_height" type="text" name="name" placeholder="Password" required>
                <input class="confirm_password width_height" type="text" name="name" placeholder="Confirm Password" required>
            </div>
            <button class="button_register">
                Register
            </button>
        </form>
    </main>
    <footer>
            <p class="or_register_with" >
             Or register with
             </p>
             <button class="google width_height" type="button" name="Continue with Google">
                <img src="images/google.svg" alt="google">
                Continue with Google
             </button>
             <button class="facebook width_height" type="button" name="Continue with Facebook" >
                <img src="images/facebook.svg" alt="facebook">
               Continue with Facebook
             </button>
             
    </footer>
</body>
</html>
